<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Biomedle</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
    }

    .table {
      margin: 20px auto;
      border-collapse: collapse;
    }

    .table td, .table th {
      border: 1px solid #444;
      padding: 8px 12px;
    }

    .green { background: #2ecc71; color: black; }
    .yellow { background: #f1c40f; color: black; }
    .red { background: #e74c3c; color: black; }

    .row {
      margin-bottom: 15px;
    }

    #history {
      margin-top: 20px;
    }

    .guessBlock {
      margin-bottom: 20px;
      display: inline-block;
    }
  </style>
</head>

<body>

<h1>🎓 Zgadnij prowadzącego</h1>

<input list="names" id="guessInput" placeholder="Wpisz nazwisko">
<datalist id="names"></datalist>
<button onclick="guess()">Zgadnij</button>

<div id="history"></div>

</body>
</html>
